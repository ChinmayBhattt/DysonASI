<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DysonASI - AI Assistant</title>
    
      <!-- Favicon -->
      <link rel="icon" type="image/x-icon" href="favicon.ico">
      
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    <script defer src="newchat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-bold-rounded/css/uicons-bold-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-bold-rounded/css/uicons-bold-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-bold-straight/css/uicons-bold-straight.css'>
</head>
<body>
    <div class="top-bar">
        <div class="logo" ><h2><b>DysonASI</b></h2></div>
        <div class="icon-group"></div>
    </div>
    
    <div class="container">
        <div class="container-content">
            <div class="sidebar">
                <div class="menu-item new-chat"><i class="fi fi-br-comment-medical"></i> New Chat</div>
                
                <!-- Settings Dropdown -->
                <div>
                     <div class="menu-item settings-btn"><i class="fi fi-br-settings"></i> Settings</div>

                     <div class="settings-menu">
                         <div class="settings-item delete-chats"><i class="fi fi-br-trash"></i> Delete All Chats</div>
                         <div class="settings-item contact-us"><i class="fi fi-br-envelope" > </i> Contact Us</div> <a href="https://linktr.ee/DysonASI"></a>
                         <div class="settings-item toggle-theme"><i class="fi fi-bs-palette"></i> Toggle Theme</div>
                         <div class="settings-item login"><i class="fi fi-br-sign-in-alt"></i> Login</div>
                     </div>
                    
                 </div>
            </div>
            
            <div class="main-content">
                <div class="chat-header">
                    <h2>AI Assistant</h2>
                </div>
        <div class="messages-container"></div>
            <div class="input-container">
                    <label for="file-upload" class="file-icon">
                        <i class="fas fa-plus"></i> 
                    </label>
                    <div class="search-icon" onclick="toggleSearch(this)">
                        <i class="fas fa-search"></i> Search
                    </div>
                    <div class="thought-icon" onclick="toggleSearch(this)">
                        <i class="fas fa-lightbulb"></i> Thoughts
                    </div>
                   
                   
                    
                    <input type="file" id="file-upload" accept="image/*,video/*" hidden>
                    <input type="text" class="input-field" placeholder="Type your message...">
                    <button class="send-btn"><i class="fas fa-paper-plane"></i> Send</button>
                    <div class="voice-icon" onclick="startVoiceRecognition()">
                        <i class="fas fa-microphone"></i>
                    </div>
                </div>
                

            </div>
        </div>
    </div>
</body>
</html>
