<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DysonASI - AI Assistant</title>
    
      <!-- Favicon -->
      <link rel="icon" type="image/x-icon" href="favicon.ico">
      
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-bold-rounded/css/uicons-bold-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    
</head>
<body>
    <div class="top-bar">
        <div class="logo"><h2><b>DysonASI</b></h2></div>
        <div class="icon-group"></div>
    </div>
    
    <div class="container">
        <div class="container-content">
            <div class="sidebar">
                <div class="menu-item new-chat"><i class="fas fa-comment"></i> New Chat</div>
                
                <!-- Settings Dropdown -->
                <div>
                     <div class="menu-item settings-btn"><i class="fi fi-br-settings"></i> Settings</div>

                     <div class="settings-menu">
                         <div class="settings-item delete-chats"><i class="fi fi-br-trash"></i> Delete All Chats</div>
                         <div class="settings-item contact-us"><i class="fi fi-br-envelope"></i> Contact Us</div>
                         <div class="settings-item login"><i class="fi fi-br-sign-in-alt"></i> Login</div>
                     </div>
                    
                 </div>
            </div>
            
            <div class="main-content">
                <div class="chat-header">
                    <h2>AI Assistant</h2>
                </div>
                <div class="messages-container"></div>
                <div class="input-container">
                    <input type="text" class="input-field" placeholder="Type your message...">
                    <button class="send-btn"><i class="fas fa-paper-plane"></i> Send</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
