<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DysonASI Chat</title>
    
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="top-bar">
        <div class="logo"><h2><b>DysonASI</b></h2></div>
        <div class="icon-group">
            <i class="fas fa-circle-half-stroke theme-toggle"></i>
        </div>
    </div>
    <div class="container">
        <div class="container-content">
            <div class="sidebar">
                <div class="menu-item"><i class="fas fa-comment"></i> New Chat</div>
            </div>
            <div class="main-content">
                <div class="chat-header">
                    <h2>AI Assistant</h2>
                </div>
                <div class="messages-container"></div>
                <div class="input-container">
                    <input type="text" class="input-field" placeholder="Type your message...">
                    <button class="send-btn"><i class="fas fa-paper-plane"></i> Send</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
