<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon AI Chat</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #422afb;
            --secondary: #7551ff;
            --dark: #1b254b;
            --light: #f8f9fa;
            --shadow: 0 20px 27px 0 rgb(0 0 0 / 5%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f4f7fe;
            min-height: 100vh;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: white;
            box-shadow: var(--shadow);
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            border-radius: 50px;
        }

        .search-bar {
            flex: 1;
            max-width: 400px;
            padding: 10px 16px;
            border: none;
            border-radius: 50px;
            background: #f1f3f9;
            color: var(--dark);
            font-size: 14px;
            outline: none;
        }

        .icon-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-menu {
            position: relative;
            cursor: pointer;
        }

        .profile-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 45px;
            background: white;
            box-shadow: var(--shadow);
            border-radius: 8px;
            overflow: hidden;
        }

        .profile-menu:hover .profile-dropdown {
            display: block;
        }

        .profile-dropdown .menu-item {
            padding: 10px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .profile-dropdown .menu-item:hover {
            background: var(--light);
        }

        .container-content {
            display: flex;
            flex: 1;
            margin-top: 70px;
        }

        .sidebar {
            width: 280px;
            background: white;
            padding: 20px;
            box-shadow: var(--shadow);
        }

        .main-content {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            margin-bottom: 20px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .message {
            max-width: 70%;
            padding: 15px 20px;
            margin: 10px 0;
            border-radius: 12px;
        }

        .user-message {
            background: var(--primary);
            color: white;
            margin-left: auto;
        }

        .ai-message {
            background: #f8f9fa;
            color: var(--dark);
        }

        .input-container {
            display: flex;
            gap: 15px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .input-field {
            flex: 1;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
        }

        .send-btn {
            padding: 15px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .send-btn:hover {
            background: var(--secondary);
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo"><h2><b>DysonASI</b></h2></div>
        <i class="fas fa-search"></i>
        <input type="text" class="search-bar" placeholder="Search...">
        <div class="icon-group">
            <i class="fas fa-lock"></i>
            <i class="fas fa-info-circle"></i>
            <i class="fas fa-circle-half-stroke"></i>
            <div class="profile-menu">
                <div class="profile-icon">AP</div>
                <div class="profile-dropdown">
                    <div class="menu-item"><i class="fas fa-history"></i> History</div>
                    <div class="menu-item"><i class="fas fa-cog"></i> Settings</div>
                </div>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="container-content">
            <div class="sidebar">
                <div class="menu-item"><i class="fas fa-comment"></i> New Chat</div>
            </div>
            <div class="main-content">
                <div class="chat-header">
                    <h2>AI Assistant</h2>
                </div>
                <div class="messages-container"></div>
                <div class="input-container">
                    <input type="text" class="input-field" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
                    <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        function sendMessage() {
            const inputField = document.querySelector('.input-field');
            const message = inputField.value.trim();
            if (message) {
                addMessage(message, true);
                setTimeout(() => {
                    addMessage("This is an AI response.", false);
                }, 1000);
                inputField.value = '';
            }
        }
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        function addMessage(text, isUser) {
            const messagesContainer = document.querySelector('.messages-container');
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', isUser ? 'user-message' : 'ai-message');
            messageDiv.textContent = text;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    </script>
</body>
</html>
